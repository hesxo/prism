groups:
  - name: prism_alerts
    interval: 30s
    rules:
      # Service availability alerts
      - alert: PrismServiceDown
        expr: up{job=~"service-a|service-b"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."
          runbook: "https://github.com/yourusername/prism/wiki/Runbook-ServiceDown"

      - alert: PrismProxyDown
        expr: up{job="nginx"} == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "NGINX reverse proxy is down"
          description: "The Prism gateway is unavailable. Check NGINX container."
          runbook: "https://github.com/yourusername/prism/wiki/Runbook-ProxyDown"

      # Performance alerts
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_service=~"service-a|service-b"}[5m])) by (container_label_com_docker_compose_service) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.container_label_com_docker_compose_service }}"
          description: "CPU usage is above 80% for 5 minutes."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{container_label_com_docker_compose_service=~"service-a|service-b"} / container_spec_memory_limit_bytes{container_label_com_docker_compose_service=~"service-a|service-b"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.container_label_com_docker_compose_service }}"
          description: "Memory usage is above 85% of limit."

      - alert: HighErrorRate
        expr: rate(container_network_receive_errors_total{container_label_com_docker_compose_service=~"service-a|service-b"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Network errors detected on {{ $labels.container_label_com_docker_compose_service }}"
          description: "Service is experiencing network errors."

      - alert: ContainerRestarting
        expr: increase(container_restarts_total{container_label_com_docker_compose_service=~"service-a|service-b|nginx"}[15m]) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} is restarting"
          description: "Container has restarted {{ $value }} times in the last 15 minutes."

      # Disk space alerts
      - alert: DiskSpaceLow
        expr: (1 - (container_fs_usage_bytes{device=~"^/dev/sda.*"} / container_fs_limit_bytes{device=~"^/dev/sda.*"})) * 100 < 10
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Low disk space on {{ $labels.device }}"
          description: "Disk space is below 10%."

      # Business metrics alerts
      - alert: HighTrafficSpike
        expr: rate(container_network_receive_bytes_total{container_label_com_docker_compose_service="nginx"}[5m]) > 50e6
        for: 5m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Traffic spike detected"
          description: "NGINX is receiving >50MB/s. This might indicate increased load."

      - alert: NoTraffic
        expr: rate(container_network_receive_bytes_total{container_label_com_docker_compose_service="nginx"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "No traffic detected"
          description: "No incoming traffic for 10 minutes. Is this expected?"

