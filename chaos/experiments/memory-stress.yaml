apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: memory-stress-experiment
  namespace: prism
spec:
  mode: one
  duration: "60s"
  selector:
    namespaces:
      - prism
    labelSelectors:
      app: service-b
  stressors:
    memory:
      workers: 1
      size: "256MB"
  scheduler:
    cron: "@every 30m"
