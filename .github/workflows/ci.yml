name: Prism CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Nightly security scan

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        if: |
          github.event_name == 'schedule' ||
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        # If this still fails due to token scope on some runners, keep the job running
        # and capture the artifact for manual review.
        continue-on-error: true

      - name: Upload Trivy SARIF artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-fallback
          path: trivy-results.sarif

  build-and-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd services/service-a && npm ci
          cd ../service-b && npm ci
          
      - name: Run tests
        run: |
          cd services/service-a && npm test -- --coverage
          cd ../service-b && npm test -- --coverage
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3

  build-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Service A
        uses: docker/build-push-action@v4
        with:
          context: ./services/service-a
          tags: prism-service-a:latest
          load: true
      
      - name: Build Service B
        uses: docker/build-push-action@v4
        with:
          context: ./services/service-b
          tags: prism-service-b:latest
          load: true
      
      - name: Build NGINX
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          tags: prism-nginx:latest
          load: true

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v3
      
      - name: Start services
        run: |
          docker-compose up -d
          sleep 30
          
      - name: Run integration tests
        run: |
          chmod +x scripts/test-prism.sh
          ./scripts/test-prism.sh
          
      - name: Run observability tests
        run: |
          chmod +x scripts/test-observability.sh
          ./scripts/test-observability.sh
          
      - name: Collect logs
        if: always()
        run: docker-compose logs
