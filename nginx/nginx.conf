events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Upstream definitions (load balancing)
    upstream service_a_cluster {
        # Load balancing methods:
        # least_conn;  # Send to least busy server
        # ip_hash;     # Sticky sessions based on IP
        # random;      # Random distribution
        
        # Simple round-robin (default)
        server service-a:3000 max_fails=3 fail_timeout=30s;
        server service-a:3000 max_fails=3 fail_timeout=30s;  # Second instance for scaling
        # Add more as needed: server service-a:3001, etc.
        
        keepalive 32;
    }
    
    upstream service_b_cluster {
        server service-b:3000 max_fails=3 fail_timeout=30s weight=2;  # Weight 2 = gets double traffic
        server service-b:3000 max_fails=3 fail_timeout=30s weight=1;
        
        keepalive 32;
    }
    
    # Main server block
    server {
        listen 80;
        server_name localhost;
        
        # Root location - load balancing between services
        location / {
            # Prism effect: split traffic based on path or header
            # By default, round-robin between A and B
            
            # You can uncomment one of these strategies:
            
            # Strategy 1: Split by path
            # if ($request_uri ~* "^/api/v1/") {
            #     proxy_pass http://service_a_cluster;
            #     break;
            # }
            # if ($request_uri ~* "^/api/v2/") {
            #     proxy_pass http://service_b_cluster;
            #     break;
            # }
            
            # Strategy 2: Split by header
            # if ($http_x_service_preference = "blue") {
            #     proxy_pass http://service_b_cluster;
            #     break;
            # }
            # if ($http_x_service_preference = "red") {
            #     proxy_pass http://service_a_cluster;
            #     break;
            # }
            
            # Strategy 3: Simple round-robin (currently active)
            # Use a variable to decide which upstream to use
            set $upstream "service_a_cluster";
            
            # Simple round-robin based on request count
            # This is a simplistic approach - in production use proper load balancing
            if ($request_id ~* "[0-9a-f]{1}") {
                set $upstream "service_b_cluster";
            }
            
            proxy_pass http://$upstream;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Next upstream on error
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 5s;
        }
        
        # Health check endpoint for load balancer
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # NGINX metrics for Prometheus
        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
        }
        
        # API routing examples
        location /api/v1/ {
            proxy_pass http://service_a_cluster/;
            proxy_set_header X-API-Version v1;
            proxy_set_header Host $host;
        }
        
        location /api/v2/ {
            proxy_pass http://service_b_cluster/;
            proxy_set_header X-API-Version v2;
            proxy_set_header Host $host;
        }
        
        # Special endpoints for debugging
        location /debug/headers {
            return 200 "$http_x_service_preference";
        }
        
        location /debug/upstream {
            add_header X-Upstream $upstream_addr;
            add_header X-Upstream-Status $upstream_status;
            return 200 "OK";
        }
        
        # Static error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
